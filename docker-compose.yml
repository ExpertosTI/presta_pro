services:
  api:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://prestapro:prestapro@db:5432/prestapro?schema=public
      - JWT_SECRET=${JWT_SECRET:-pon_un_secreto_largo_aqui}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-25}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@renace.tech}
      - ADMIN_NOTIFY_EMAIL=${ADMIN_NOTIFY_EMAIL:-adderlymarte@hotmail.com}
      - APP_BASE_URL=https://prestanace.renace.tech
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-}
      - EVOLUTION_WEBHOOK_SECRET=${EVOLUTION_WEBHOOK_SECRET:-}
      - PLATFORM_WHATSAPP_NOTIFY=${PLATFORM_WHATSAPP_NOTIFY:-}
      - WHATSAPP_NOTIFY_CLIENT=${WHATSAPP_NOTIFY_CLIENT:-true}
    # Reach Evolution on the host (if published on 0.0.0.0) via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - prestapro_internal
      # Red Docker de Evolution (default RenaceNet en este VPS)
      - evolution_shared
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=prestapro
      - POSTGRES_USER=prestapro
      - POSTGRES_PASSWORD=prestapro
    volumes:
      - prestapro_db_data:/var/lib/postgresql/data
    networks:
      - prestapro_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prestapro -d prestapro"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_API_URL=${VITE_API_URL:-https://prestanace.renace.tech/api}
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - prestapro_internal

volumes:
  prestapro_db_data:

networks:
  prestapro_internal:
    driver: bridge
  # Red externa donde corre evolution_api (en este VPS: RenaceNet)
  # Override: EVOLUTION_DOCKER_NETWORK=... en .evolution.local / .env
  evolution_shared:
    external: true
    name: ${EVOLUTION_DOCKER_NETWORK:-RenaceNet}
