version: '3.8'

services:
  api:
    image: rebless-api:latest
    build:
      context: ./server
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_BASE_URL=${APP_BASE_URL:-https://rebless.renace.tech}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - ADMIN_NOTIFY_EMAIL=${ADMIN_NOTIFY_EMAIL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    networks:
      - RenaceNet
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-prestapro}
      - POSTGRES_USER=${POSTGRES_USER:-prestapro}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-prestapro}
    volumes:
      - prestapro_db_data:/var/lib/postgresql/data
    networks:
      - RenaceNet
    deploy:
      restart_policy:
        condition: on-failure

  web:
    image: rebless-web:latest
    build:
      context: .
      args:
        - VITE_API_URL=https://rebless.renace.tech/api
    networks:
      - RenaceNet
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rebless.rule=Host(`rebless.renace.tech`)"
        - "traefik.http.routers.rebless.entrypoints=websecure"
        - "traefik.http.routers.rebless.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.rebless.loadbalancer.server.port=80"
      resources:
        limits:
          cpus: '0.30'
          memory: 256M

volumes:
  prestapro_db_data:

networks:
  RenaceNet:
    external: true
