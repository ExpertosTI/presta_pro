services:
  api:
    build:
      context: ./server
    environment:
      - DATABASE_URL=postgresql://prestapro:prestapro@db:5432/prestapro?schema=public
      - JWT_SECRET=${JWT_SECRET:-pon_un_secreto_largo_aqui}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-25}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@renace.tech}
      - ADMIN_NOTIFY_EMAIL=${ADMIN_NOTIFY_EMAIL:-adderlymarte@hotmail.com}
      - APP_BASE_URL=https://prestanace.renace.tech
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
    networks:
      - prestapro_internal
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=prestapro
      - POSTGRES_USER=prestapro
      - POSTGRES_PASSWORD=prestapro
    volumes:
      - prestapro_db_data:/var/lib/postgresql/data
    networks:
      - prestapro_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.30'
          memory: 512M

  web:
    build:
      context: .
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_API_URL=${VITE_API_URL:-https://prestanace.renace.tech/api}
    depends_on:
      - api
    networks:
      - prestapro_internal
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prestapro-http.rule=Host(`prestanace.renace.tech`)"
        - "traefik.http.routers.prestapro-http.entrypoints=web"
        - "traefik.http.routers.prestapro-http.middlewares=prestapro-redirect-https"
        - "traefik.http.routers.prestapro-https.rule=Host(`prestanace.renace.tech`)"
        - "traefik.http.routers.prestapro-https.entrypoints=websecure"
        - "traefik.http.routers.prestapro-https.tls=true"
        - "traefik.http.routers.prestapro-https.tls.certresolver=letsencryptresolver"
        - "traefik.http.middlewares.prestapro-redirect-https.redirectscheme.scheme=https"
        - "traefik.http.services.prestapro-svc.loadbalancer.server.port=80"
        - "traefik.docker.network=RenaceNet"
      resources:
        limits:
          cpus: '0.30'
          memory: 256M

volumes:
  prestapro_db_data:

networks:
  prestapro_internal:
    driver: overlay
  RenaceNet:
    external: true
